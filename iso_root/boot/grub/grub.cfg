set default=0
set timeout=5

# Configuración de colores de la interfaz de GRUB (Azul holográfico)
set menu_color_normal=cyan/blue
set menu_color_highlight=white/blue

menuentry "DreamByte OS Live (Amd64 v1.0)" {
    search --set=root --file /boot/vmlinuz
    linux /boot/vmlinuz boot=live quiet splash FONT=latarcyrheb-sun16
    initrd /boot/initrd.img
}

menuentry "DreamByte OS (Modo Seguro / Consola)" {
    search --set=root --file /boot/vmlinuz
    linux /boot/vmlinuz boot=live nomodeset text
    initrd /boot/initrd.img
}
