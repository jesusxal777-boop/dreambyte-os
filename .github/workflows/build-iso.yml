name: Compilar DreamByte OS ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Esto te permite activar la compilación manualmente con un botón

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código del repositorio
      uses: actions/checkout@v4

    - name: Dar permisos de ejecución al script
      run: chmod +x build.sh

    - name: Ejecutar la compilación del Sistema Operativo Real
      run: sudo ./build.sh

    - name: Subir ISO final a los servidores de GitHub
      uses: actions/upload-artifact@v4
      with:
        name: DreamByteOS-Installer
        path: DreamByteOS.iso
        if-no-files-found: error
        
